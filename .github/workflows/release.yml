name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Javy
        run: |
          curl -fsSL https://github.com/bytecodealliance/javy/releases/download/v8.0.0/javy-x86_64-linux-v8.0.0.gz \
            | gunzip > /usr/local/bin/javy && chmod +x /usr/local/bin/javy

      - run: npm ci
      - run: npm run build:wasm

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --generate-notes \
            dist/lit-ssr-builtin.wasm \
            dist/lit-ssr-runtime.wasm

  build-binaries:
    needs: create-release
    uses: bennypowers/go-release-workflows/.github/workflows/build-binaries.yml@main
    with:
      binary-name: lit-ssr
      release-tag: ${{ github.ref_name }}

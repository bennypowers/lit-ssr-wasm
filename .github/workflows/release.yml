name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Javy
        run: |
          curl -fsSL https://github.com/bytecodealliance/javy/releases/download/v8.0.0/javy-x86_64-linux-v8.0.0.gz \
            | gunzip > /usr/local/bin/javy && chmod +x /usr/local/bin/javy

      - run: npm ci
      - run: npm run build:wasm

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --generate-notes \
            dist/lit-ssr-builtin.wasm \
            dist/lit-ssr-runtime.wasm

  build-binaries:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, platform: linux-x64 }
          - { goos: linux, goarch: arm64, platform: linux-arm64 }
          - { goos: darwin, goarch: amd64, platform: darwin-x64 }
          - { goos: darwin, goarch: arm64, platform: darwin-arm64 }
          - { goos: windows, goarch: amd64, platform: win32-x64, ext: .exe }
          - { goos: windows, goarch: arm64, platform: win32-arm64, ext: .exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install Javy
        run: |
          curl -fsSL https://github.com/bytecodealliance/javy/releases/download/v8.0.0/javy-x86_64-linux-v8.0.0.gz \
            | gunzip > /usr/local/bin/javy && chmod +x /usr/local/bin/javy

      - run: npm ci
      - run: npm run build:wasm

      - name: Copy WASM to go/
        run: cp dist/lit-ssr-builtin.wasm go/lit-ssr.wasm

      - name: Build ${{ matrix.platform }}
        working-directory: go
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags '-s -w' -o ../dist/bin/lit-ssr-${{ matrix.platform }}${{ matrix.ext }} ./cmd/lit-ssr

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload '${{ github.ref_name }}' dist/bin/lit-ssr-${{ matrix.platform }}${{ matrix.ext }} --clobber
